# Configuracao central da guto-wiki.
#
# Formato: KEY=value, uma chave por linha. Caminhos sao relativos a raiz do repositorio.
# Este arquivo nao guarda segredo; serve para evitar paths de documentacao/ferramentas espalhados.

WIKI_INDEX=index.md
WIKI_LOG=log.md
WIKI_LINT=scripts/wiki-lint.py

PACKAGE_ROOT=padronizacao-documentacao/artefatos
PACKAGE_SCHEMA=padronizacao-documentacao/artefatos/docs/SCHEMA.md
PACKAGE_DOCS_LINT=padronizacao-documentacao/artefatos/scripts/docs-wiki-lint.py
PACKAGE_REF_INTEGRITY=padronizacao-documentacao/artefatos/scripts/ref-integrity.py

# Understand Anything / Anything LLM tooling.
# O grafo e cache local gerado: fica ignorado pelo Git, mas o path fica documentado aqui.
UNDERSTAND_PROJECT_ROOT=.
UNDERSTAND_GRAPH_DIR=.understand-anything
UNDERSTAND_KNOWLEDGE_GRAPH=.understand-anything/knowledge-graph.json
UNDERSTAND_INCREMENTAL_DOC=
UNDERSTAND_INCREMENTAL_SKILL=
UNDERSTAND_CHANGED_FILES_CMD=git diff --name-only <base>..HEAD

# Caches/artefatos locais que lints e Git devem ignorar.
IGNORED_TOOL_DIRS=.understand-anything,.anythingllm,__pycache__,.pytest_cache,.mypy_cache,.ruff_cache
