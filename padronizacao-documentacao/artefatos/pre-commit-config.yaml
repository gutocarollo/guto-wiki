repos:
  - repo: local
    hooks:
      - id: docs-wiki-lint-staged
        name: docs wiki lint staged policy
        entry: python3 scripts/docs-wiki-lint.py --staged
        language: system
        pass_filenames: false

      - id: docs-wiki-lint-global
        name: docs wiki lint global
        entry: python3 scripts/docs-wiki-lint.py
        language: system
        pass_filenames: false

      - id: ref-integrity-staged
        name: ref integrity staged
        entry: python3 scripts/ref-integrity.py --staged
        language: system
        pass_filenames: false
