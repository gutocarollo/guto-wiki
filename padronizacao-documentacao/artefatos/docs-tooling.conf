# Configuracao central para portar a governanca documental a outro repositorio.
#
# Copie para a raiz do repo destino como `docs-tooling.conf` ou adapte para o config padrao do projeto.
# Nao guardar segredos aqui. O objetivo e centralizar paths de documentacao, lints, hooks e grafos.

DOCS_ROOT=docs
DOCS_INDEX=docs/index.md
DOCS_LOG=docs/log.md
DOCS_SCHEMA=docs/SCHEMA.md
DOCS_WIKI_LINT=scripts/docs-wiki-lint.py
REF_INTEGRITY=scripts/ref-integrity.py
REF_INTEGRITY_ALLOWLIST=.ref-integrity-allowlist
REF_INTEGRITY_ARCHIVE_PREFIXES=docs/_arquivo/

GITHOOKS_PRE_COMMIT=.githooks/pre-commit
PRE_COMMIT_CONFIG=.pre-commit-config.yaml
DOCS_CI_WORKFLOW=.github/workflows/docs-integrity.yaml
LOOP_DOC=.claude/loop.md
LESSONS_FILE=tasks/lessons.md

# Understand Anything / Anything LLM tooling.
# Ajuste estes valores por repo. Os valores abaixo preservam o caso LearnHouse como exemplo centralizado,
# em vez de espalhar paths em skills e docs.
UNDERSTAND_PROJECT_ROOT=apps
UNDERSTAND_GRAPH_DIR=apps/.understand-anything
UNDERSTAND_KNOWLEDGE_GRAPH=apps/.understand-anything/knowledge-graph.json
UNDERSTAND_INCREMENTAL_DOC=docs/architecture/2026-07-07-understand-anything-incremental-apps.md
UNDERSTAND_INCREMENTAL_SKILL=understand-apps-incremental
UNDERSTAND_CHANGED_FILES_CMD=git diff --relative=apps <last>..HEAD --name-only -- apps
UNDERSTAND_BATCH_INPUT_PATH_STYLE=relative-to-understand-project-root

# Caches/artefatos locais que lints e Git devem ignorar.
IGNORED_TOOL_DIRS=.understand-anything,apps/.understand-anything,.anythingllm,__pycache__,.pytest_cache,.mypy_cache,.ruff_cache
